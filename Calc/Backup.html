<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>

    <style>
        /* ---------- GLOBAL STYLING ---------- */
        body {
            margin: 0;
            background: #0d0b14;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .container {
            width: 380px;
            padding: 25px;
            background: rgba(30, 0, 40, 0.6);
            border-radius: 18px;
            box-shadow: 0 0 25px #7000ff80;
            backdrop-filter: blur(10px);
            border: 1px solid #9a3dff70;
        }

        h1 {
            text-align: center;
            color: #d9b3ff;
            font-size: 28px;
            margin-bottom: 15px;
            text-shadow: 0 0 12px #8f3dff;
        }

        .screen {
            width: 100%;
            height: 60px;
            background: #1a0f29;
            border: 1px solid #8f3dff;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 22px;
            padding: 10px;
            box-shadow: inset 0 0 10px #6100b8;
            color: #e6d4ff;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        button {
            background: #2b0947;
            color: #e4c4ff;
            padding: 15px;
            font-size: 18px;
            border: 1px solid #8f3dff50;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 0 10px #7a27ff40;
        }

        button:hover {
            background: #5e00b8;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 0 18px #a655ff;
        }

        .equal {
            background: #7d00ff;
            color: white;
            box-shadow: 0 0 25px #a655ff;
        }

        .equal:hover {
            background: #9f33ff;
        }

        .result-box {
            margin-top: 15px;
            text-align: center;
            font-size: 20px;
            color: #d6baff;
            text-shadow: 0 0 8px #b065ff;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Scientific Calculator</h1>

    <!-- DISPLAY SCREEN -->
    <input class="screen" id="display" readonly placeholder="0">

    <!-- FORM -->
    <form method="POST">

        <!-- HIDDEN INPUTS (Flask reads these) -->
        <input type="hidden" id="num1" name="num1">
        <input type="hidden" id="num2" name="num2">
        <input type="hidden" id="operation" name="operation">

        <!-- BASIC ROW -->
        <div class="row">
            <button type="button" onclick="press('7')">7</button>
            <button type="button" onclick="press('8')">8</button>
            <button type="button" onclick="press('9')">9</button>
            <button type="button" onclick="setOp('/')">÷</button>
        </div>

        <div class="row">
            <button type="button" onclick="press('4')">4</button>
            <button type="button" onclick="press('5')">5</button>
            <button type="button" onclick="press('6')">6</button>
            <button type="button" onclick="setOp('*')">×</button>
        </div>

        <div class="row">
            <button type="button" onclick="press('1')">1</button>
            <button type="button" onclick="press('2')">2</button>
            <button type="button" onclick="press('3')">3</button>
            <button type="button" onclick="setOp('-')">−</button>
        </div>

        <div class="row">
            <button type="button" onclick="press('0')">0</button>
            <button type="button" onclick="press('.')">.</button>
            <button type="button" onclick="setOp('+')">+</button>
            <button type="submit" class="equal">=</button>
        </div>

        <!-- SCI-FI OPERATIONS -->
        <div class="row">
            <button type="button" onclick="setSingle('sin')">sin</button>
            <button type="button" onclick="setSingle('cos')">cos</button>
            <button type="button" onclick="setSingle('tan')">tan</button>
            <button type="button" onclick="setSingle('sqrt')">√</button>
        </div>

        <div class="row">
            <button type="button" onclick="setSingle('log')">log</button>
            <button type="button" onclick="setSingle('exp')">exp</button>
            <button type="button" onclick="setOp('^')">xʸ</button>
            <button type="button" onclick="clearDisplay()">C</button>
        </div>
    </form>

    <!-- RESULT FROM FLASK -->
    {% if result %}
        <div class="result-box">Result: {{ result }}</div>
    {% endif %}
</div>


<script>
    let display = document.getElementById("display");
    let num1Field = document.getElementById("num1");
    let num2Field = document.getElementById("num2");
    let opField = document.getElementById("operation");

    let firstNumber = "";
    let secondNumber = "";
    let currentOperation = "";
    let isSecond = false;

    function press(num) {
        if (!isSecond) {
            firstNumber += num;
            display.value = firstNumber;
        } else {
            secondNumber += num;
            display.value = firstNumber + " " + currentOperation + " " + secondNumber;
        }
    }

    function setOp(op) {
        currentOperation = op;
        isSecond = true;
        display.value = firstNumber + " " + op;
        opField.value = op;
    }

    function setSingle(op) {
        num1Field.value = display.value;
        opField.value = op;
        document.forms[0].submit();
    }

    function clearDisplay() {
        firstNumber = "";
        secondNumber = "";
        currentOperation = "";
        isSecond = false;
        display.value = "";
        num1Field.value = "";
        num2Field.value = "";
        opField.value = "";
    }

    // Before submitting → send data to Flask
    document.forms[0].onsubmit = function() {
        num1Field.value = firstNumber;
        num2Field.value = secondNumber;
    }
</script>

</body>
</html>
